<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Grade Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
   <div class="fluid-wrapper">
     
        <div class="Grade-card">
            
            
            <div class="card-header">
                <h2>Grade Calculator</h2>
                <p>Enter your percentage and see the grade</p>
            </div>
            
            <div class="card-body">
                <div class="input-panel">
                  
                    <div class="capsule-input-field">
                        <input type="number" id="percentage" placeholder="Enter percentage..." min="0" max="100">
                        <div class="unit-circle">%</div>
                    </div>
                </div>
              
                <button id="check-btn">Calculate Grade</button>
                
                <div id="result-box" class="result-pill hide">
                    <p id="result-text"></p>
                </div>
            </div>
        </div>
    </div>

   <script src="index.js"></script>
  
</body>

</html>
